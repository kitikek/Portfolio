name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and start services with Docker Compose
        run: docker-compose up -d --build

      - name: Wait for services to be ready
        run: sleep 20

      - name: Run integration tests (Postman / Newman)
        run: |
          npm install -g newman
          newman run ./tests/portfolio.postman_collection.json \
            -e ./tests/portfolio.postman_environment.json \
            --reporters cli,json --reporter-json-export test-results.json

      - name: Stop services
        run: docker-compose down

      - name: Build and push Docker images (on main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest